name: Keep Render Services Awake

on:
  schedule:
    # Run every 14 minutes (Render sleeps after 15 min idle)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          echo "Pinging backend API..."
          curl -f https://migration-studio-api.onrender.com/health || echo "Backend ping failed"

      - name: Ping Frontend
        run: |
          echo "Pinging frontend..."
          curl -f https://migration-studio-pqor.onrender.com/ || echo "Frontend ping failed"

      - name: Done
        run: echo "Keep-alive ping completed at $(date)"
