services:
  # Frontend - Next.js
  - type: web
    name: migration-studio-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && rm -rf .next && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://migration-studio-api.onrender.com/api
      - key: NODE_ENV
        value: production

  # Backend - FastAPI
  - type: web
    name: migration-studio-api
    env: python
    region: oregon
    pythonVersion: "3.11"
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://migration-studio-pqor.onrender.com
      - key: ENVIRONMENT
        value: production
      # Optional: Set DATABASE_URL in Render Dashboard to enable database features
      # Format: postgresql://neondb_owner:PASSWORD@ep-dark-hill-aiwdm4cf-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: ANTHROPIC_API_KEY
        sync: false  # Set in Render dashboard for AI enhancements


