services:
  # Frontend - Next.js
  - type: web
    name: migration-studio-frontend
    env: node
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://migration-studio-api.onrender.com/api
      - key: NODE_ENV
        value: production

  # Backend - FastAPI
  - type: web
    name: migration-studio-api
    env: python
    region: oregon
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard
      - key: FRONTEND_URL
        value: https://migration-studio-frontend.onrender.com
      - key: ENVIRONMENT
        value: production

databases:
  - name: migration-db
    databaseName: neondb
    user: neondb_owner
    region: oregon
